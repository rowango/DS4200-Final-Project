<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Incidents vs Needle Pickups</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
    h2 { text-align: center; color: #1a3a5c; }
    p  { text-align: center; font-size: 13px; color: #555; }

    .btn {
      padding: 5px 12px; margin: 3px;
      border: 1px solid #1a3a5c; background: white;
      color: #1a3a5c; cursor: pointer; border-radius: 3px;
    }
    .btn.active { background: #1a3a5c; color: white; }
    #controls { text-align: center; margin-bottom: 10px; }

    #tooltip {
      position: absolute; background: rgba(0,0,0,0.75);
      color: white; padding: 8px 12px; border-radius: 4px;
      font-size: 13px; pointer-events: none; opacity: 0;
    }
  </style>
</head>
<body>

<h2>Narcotic Incidents vs. Needle Pickup Requests by Neighborhood</h2>
<p>Dots <b style="color:#c0392b">below the line</b> = city response lagging behind incidents (gap neighborhoods).<br>
   Dots <b style="color:#1a3a5c">above the line</b> = response keeping pace. Hover for details.</p>

<div id="controls">
  <button class="btn active" onclick="update('all')">All Years</button>
  <button class="btn" onclick="update(2020)">2020</button>
  <button class="btn" onclick="update(2021)">2021</button>
  <button class="btn" onclick="update(2022)">2022</button>
  <button class="btn" onclick="update(2023)">2023</button>
  <button class="btn" onclick="update(2024)">2024</button>
</div>

<svg id="chart" style="display:block; margin:auto; background:white; border-radius:6px;"></svg>
<div id="tooltip"></div>

<script>
var margin = { top: 40, right: 40, bottom: 70, left: 80 };
var W = 680 - margin.left - margin.right;
var H = 500 - margin.top - margin.bottom;

var svg = d3.select("#chart")
  .attr("width", W + margin.left + margin.right)
  .attr("height", H + margin.top + margin.bottom)
  .append("g")
  .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

var tip = d3.select("#tooltip");

var neighborhoods = [
  "Roxbury", "South End/Fenway", "South Boston", "Dorchester",
  "Downtown/Beacon Hill", "Jamaica Plain", "Mattapan",
  "East Boston", "Brighton/Allston", "Charlestown",
  "West Roxbury", "Hyde Park"
];

// maps 311 neighborhood names to crime dataset names
var needleMap = {
  "Roxbury": "Roxbury",
  "South End": "South End/Fenway",
  "South Boston / South Boston Waterfront": "South Boston",
  "Dorchester": "Dorchester",
  "Back Bay": "Downtown/Beacon Hill",
  "Downtown / Financial District": "Downtown/Beacon Hill",
  "Jamaica Plain": "Jamaica Plain",
  "Fenway / Kenmore / Audubon Circle / Longwood": "South End/Fenway",
  "Greater Mattapan": "Mattapan",
  "East Boston": "East Boston",
  "Charlestown": "Charlestown",
  "Allston / Brighton": "Brighton/Allston",
  "West Roxbury": "West Roxbury",
  "Hyde Park": "Hyde Park",
  "Beacon Hill": "Downtown/Beacon Hill",
  "South Boston": "South Boston",
  "Mission Hill": "Roxbury",
  "Boston": "Downtown/Beacon Hill"
};

var x = d3.scaleLinear().range([0, W]);
var y = d3.scaleLinear().range([H, 0]);

var xAxisG = svg.append("g").attr("transform", "translate(0," + H + ")");
var yAxisG = svg.append("g");

// axis labels
svg.append("text")
  .attr("x", W / 2).attr("y", H + 55)
  .attr("text-anchor", "middle").style("font-size", "13px")
  .text("Narcotic Incidents");

svg.append("text")
  .attr("transform", "rotate(-90)")
  .attr("x", -H / 2).attr("y", -65)
  .attr("text-anchor", "middle").style("font-size", "13px")
  .text("Needle Pickup Requests (311)");

// parity line
var parLine = svg.append("line")
  .attr("stroke", "#aaa").attr("stroke-dasharray", "5,4")
  .attr("stroke-width", 1.5).attr("opacity", 0.8);

svg.append("text")
  .attr("id", "parity-label")
  .style("font-size", "11px").style("fill", "#999")
  .attr("text-anchor", "middle").text("parity line");

// dots and labels
var dots = svg.selectAll("circle")
  .data(neighborhoods).enter().append("circle")
  .attr("r", 9).attr("stroke", "white").attr("stroke-width", 1.5)
  .style("cursor", "pointer")
  .on("mousemove", function(event, n) {
    var ic = getCounts(allCrimes,  currentYr);
    var nc = getCounts(allNeedles, currentYr, needleMap);
    var inc = ic[n] || 0;
    var ned = nc[n] || 0;
    var ratio = inc > 0 ? (ned / inc).toFixed(2) : "N/A";
    tip.style("opacity", 1)
      .style("left", (event.pageX + 12) + "px")
      .style("top",  (event.pageY - 30) + "px")
      .html("<b>" + n + "</b><br>Incidents: " + inc + "<br>Needle Pickups: " + ned + "<br>Ratio: " + ratio);
  })
  .on("mouseout", function() { tip.style("opacity", 0); });

var lbls = svg.selectAll(".lbl")
  .data(neighborhoods).enter().append("text")
  .attr("class", "lbl")
  .style("font-size", "10px").style("fill", "#333")
  .style("pointer-events", "none");

var allCrimes = [], allNeedles = [], currentYr = "all";

Promise.all([
  d3.csv("opioid_incidents_clean.csv"),
  d3.csv("needle_requests_clean.csv")
]).then(function(res) {
  allCrimes  = res[0];
  allNeedles = res[1];
  update("all");
});

function getCounts(data, yr, mapper) {
  var filtered = yr === "all" ? data : data.filter(function(d) { return +d.YEAR === yr; });
  var counts = {};
  filtered.forEach(function(d) {
    var n = (d.NEIGHBORHOOD || d.neighborhood || "").trim();
    if (mapper) n = mapper[n] || n;
    if (n && n !== "Unknown") counts[n] = (counts[n] || 0) + 1;
  });
  return counts;
}

function update(yr) {
  currentYr = yr;
  d3.selectAll(".btn").classed("active", false);
  d3.selectAll(".btn").filter(function() {
    return this.textContent === (yr === "all" ? "All Years" : String(yr));
  }).classed("active", true);

  var ic = getCounts(allCrimes,  yr);
  var nc = getCounts(allNeedles, yr, needleMap);

  var maxVal = Math.max(
    d3.max(neighborhoods, function(n) { return ic[n] || 0; }),
    d3.max(neighborhoods, function(n) { return nc[n] || 0; })
  ) * 1.15 || 1;

  x.domain([0, maxVal]);
  y.domain([0, maxVal]);

  xAxisG.transition().duration(400).call(d3.axisBottom(x).ticks(5).tickFormat(d3.format(",")));
  yAxisG.transition().duration(400).call(d3.axisLeft(y).ticks(5).tickFormat(d3.format(",")));

  parLine.transition().duration(400)
    .attr("x1", x(0)).attr("y1", y(0))
    .attr("x2", x(maxVal)).attr("y2", y(maxVal));

  d3.select("#parity-label")
    .attr("x", x(maxVal * 0.72))
    .attr("y", y(maxVal * 0.72) - 8);

  dots.transition().duration(400)
    .attr("cx", function(n) { return x(ic[n] || 0); })
    .attr("cy", function(n) { return y(nc[n] || 0); })
    .attr("fill", function(n) {
      return (nc[n] || 0) >= (ic[n] || 0) ? "#1a3a5c" : "#c0392b";
    });

  lbls.transition().duration(400)
    .attr("x", function(n) { return x(ic[n] || 0) + 11; })
    .attr("y", function(n) { return y(nc[n] || 0) + 4; })
    .text(function(n) { return n.split("/")[0].trim(); });
}
</script>
</body>
</html>
